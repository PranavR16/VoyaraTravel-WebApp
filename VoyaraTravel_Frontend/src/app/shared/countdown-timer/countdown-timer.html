<div class="countdown">

  <div class="cd-label">⏳ Offer Ends In</div>

  <div class="cd-blocks">

    <div class="cd-block">
      <div class="cd-num">{{ days }}</div>
      <div class="cd-unit">Days</div>
    </div>

    <div class="cd-sep">:</div>

    <div class="cd-block">
      <div class="cd-num">{{ hours }}</div>
      <div class="cd-unit">Hours</div>
    </div>

    <div class="cd-sep">:</div>

    <div class="cd-block">
      <div class="cd-num">{{ minutes }}</div>
      <div class="cd-unit">Mins</div>
    </div>

    <div class="cd-sep">:</div>

    <div class="cd-block">
      <div class="cd-num">{{ seconds }}</div>
      <div class="cd-unit">Secs</div>
    </div>

  </div>

</div>
